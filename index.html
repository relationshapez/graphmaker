      if (newConfig.eulerTrace) { newConfig.hamiltonTrace = false; newConfig.planarityColor = false; }
      if (newConfig.hamiltonTrace) { newConfig.eulerTrace = false; newConfig.planarityColor = false; }
      if (newConfig.planarityColor) { newConfig.eulerTrace = false; newConfig.hamiltonTrace = false; }
      return newConfig;
    }


    structuralUiSignature(config) {
      return JSON.stringify({
        graphType: config.graphType,
        basicN: config.basicN,
        specialM: config.specialM,
        specialP: config.specialP,
        valenceMean: config.valenceMean,
        valenceStd: config.valenceStd,
        selfLoops: config.selfLoops,
        allowRepeatedEdges: config.allowRepeatedEdges,
        directed: config.directed,
        complete: config.complete,
      });
    }

    syncGraphCodeFromBundle() {
      if (!this.bundle) return;
      this.graphDescription = this.logic.bundleToGraphDescription(this.bundle, this.config);
      this.config.graphCode = GraphCodeCodec.encodeDescription(this.graphDescription);
      this.el.graphCode.value = this.config.graphCode;
      this.writeGraphCodeToLocation(this.config.graphCode);
    }

    writeGraphCodeToLocation(code) {
      try {
        const url = new URL(window.location.href);
        if (code) url.searchParams.set('code', code);
        else url.searchParams.delete('code');
        history.replaceState(null, '', url.toString());
      } catch (e) {}
    }

    readGraphCodeFromLocation() {
      try {
        const url = new URL(window.location.href);
        const queryCode = url.searchParams.get('code');
        if (queryCode) return queryCode;
        if (url.hash && url.hash.startsWith('#code=')) return decodeURIComponent(url.hash.slice(6));
      } catch (e) {}
      return '';
    }

    onGraphCodeEntered() {
      const code = (this.el.graphCode.value || '').trim();
      if (!code) {
        this.el.graphCode.value = this.config.graphCode || '';
        return;
      }
      try {
        this.loadGraphCode(code, true);
      } catch (e) {
        alert('Unable to load graph code\n' + e.message);
        this.el.graphCode.value = this.config.graphCode || '';
      }
    }



    inferredValenceStatsFromDescription(desc) {
      const labels = GraphCodeCodec.labelsForDescription(desc);
      const degrees = new Array(labels.length).fill(0);
      for (const edge of desc.edges) {
        const u = edge.u;
        const v = edge.v;
        if (u === v) {
          degrees[u] += 2;
        } else {
          degrees[u] += 1;
          degrees[v] += 1;
        }
      }
      if (!degrees.length) return {mean: 1.0, std: 0.0};
      const mean = degrees.reduce((a,b)=>a+b,0) / degrees.length;
      const variance = degrees.reduce((a,b)=>a + (b-mean)*(b-mean), 0) / degrees.length;
      const std = Math.sqrt(variance);
      const round1 = x => Math.round(x * 10) / 10;
      return {mean: round1(mean), std: round1(std)};
    }

    loadGraphCode(code, forceRefresh=true) {
      const desc = GraphCodeCodec.decodeCode(code);
      const inferredStats = this.inferredValenceStatsFromDescription(desc);
      const structural = {
        graphType: desc.graphType,
        basicN: desc.basicN || this.config.basicN,
        specialM: desc.specialM || this.config.specialM,
        specialP: desc.specialP || this.config.specialP,
        selfLoops: desc.selfLoops,
        allowRepeatedEdges: desc.allowRepeatedEdges,
        directed: desc.directed,
        complete: desc.complete,
        valenceMean: inferredStats.mean,
        valenceStd: inferredStats.std,
      };
      this.previousConfig = JSON.parse(JSON.stringify(this.config));
      this.config = {...this.config, ...structural, graphCode: GraphCodeCodec.encodeDescription(desc)};
      this.graphDescription = desc;
      this.lastMainSignature = null;
      this.bundle = null;
      this.viewport = null;
      this.initialViewport = null;
      this.writeConfigToUI(this.config);
      this.writeGraphCodeToLocation(this.config.graphCode);
      this.hideComputationOutputs();
      this.resetTraceState();
      this.dirtyGraph = true;
      this.dirtyTable = true;
      if (forceRefresh) this.refreshOutputsIfNeeded(true);
    }

    onGraphTypeChanged(graphType) {
      this.cancelViewportAnimation();
      const previousConfig = JSON.parse(JSON.stringify(this.config));
      this.setSelectedGraphType(graphType);
      let newConfig = this.readConfigFromUI();
      newConfig.graphType = Number(graphType);
      newConfig = this.applyGraphTypeRules(newConfig);

      const graphTypeChanged = Number(previousConfig.graphType) !== Number(newConfig.graphType);
      const structuralChanged = this.structuralUiSignature(previousConfig) !== this.structuralUiSignature(newConfig);
      const mainChanged = this.mainSignature(previousConfig, true) !== this.mainSignature(newConfig, true);

      this.previousConfig = previousConfig;
      this.config = newConfig;
      this.writeConfigToUI(newConfig);
      this.hideComputationOutputs();

      if (graphTypeChanged || structuralChanged || mainChanged) {
        this.graphDescription = null;
        this.config.graphCode = '';
        this.resetTraceState();
        this.lastMainSignature = null;
        this.viewport = null;
        this.initialViewport = null;
      }

      this.dirtyGraph = true;
      this.dirtyTable = true;
      if (this.bundle) this.crossingEdgeCache = this.config.planarityColor ? this.computeCrossingEdgeSet() : new Set();

      // Defer the rebuild until after the radio change has fully settled in the DOM.
      // This avoids the selected graph family snapping back during the same event cascade.
      window.setTimeout(() => {
        try {
          this.refreshOutputsIfNeeded(true);
        } catch (e) {
          console.error('Graph-type refresh failed', e);
        }
      }, 0);
    }

    onAnyInputChanged() {
      this.cancelViewportAnimation();
      try {
        const oldConfig = JSON.parse(JSON.stringify(this.config));
        let newConfig = this.readConfigFromUI();
        newConfig.graphType = this.getSelectedGraphType();
        newConfig = this.applyGraphTypeRules(newConfig);
        if (JSON.stringify(newConfig) === JSON.stringify(this.config)) return;
        const oldMain = this.mainSignature(this.config, true);
        const newMain = this.mainSignature(newConfig, true);
        const mainChanged = oldMain !== newMain;
        const structuralChanged = this.structuralUiSignature(oldConfig) !== this.structuralUiSignature(newConfig);
        const tracingWasOn = oldConfig.eulerTrace || oldConfig.hamiltonTrace;
        const tracingNowOn = newConfig.eulerTrace || newConfig.hamiltonTrace;
        const switchedTraceMode = (oldConfig.eulerTrace !== newConfig.eulerTrace) || (oldConfig.hamiltonTrace !== newConfig.hamiltonTrace);
        this.previousConfig = JSON.parse(JSON.stringify(this.config));
        this.config = newConfig;
        this.writeConfigToUI(newConfig);
        this.hideComputationOutputs();
        if (structuralChanged || mainChanged) {
          this.graphDescription = null;
          this.config.graphCode = '';
          this.lastMainSignature = null;
        }
        if (structuralChanged || mainChanged || (tracingWasOn && !tracingNowOn) || switchedTraceMode) this.resetTraceState();
        this.dirtyGraph = true; this.dirtyTable = true;
        if (this.bundle) this.crossingEdgeCache = this.config.planarityColor ? this.computeCrossingEdgeSet() : new Set();
        this.refreshOutputsIfNeeded(structuralChanged || mainChanged);
      } catch (e) {
        this.writeConfigToUI(this.config);
      }
    }

    toggleInteractionMode() {
      this.cancelViewportAnimation();
      this.interactionMode = this.interactionMode === 'move' ? 'pan' : 'move';
      this.updateInteractionModeUI();
      this.draggingNode = null;
      this.isPanning = false;
      this.panLastSvgPoint = null;
      this.activePointers.clear();
      this.pinchState = null;
    }


    updateInteractionModeUI() {
      const move = this.interactionMode === 'move';
      if (this.el.interactionModeToggle) this.el.interactionModeToggle.checked = !move;
      if (this.el.moveModeLabel) this.el.moveModeLabel.classList.toggle('active', move);
      if (this.el.panModeLabel) this.el.panModeLabel.classList.toggle('active', !move);
      this.updateReseedButtonUI();
    }

    updateReseedButtonUI() {
      if (!this.el.reseedBtn) return;
      this.el.reseedBtn.textContent = this.interactionMode === 'pan' ? 'Reset' : 'Reseed';
    }

    updateInteractionModeButton() {
      if (!this.el.interactionModeBtn) return;
      const move = this.interactionMode === 'move';
      this.el.interactionModeBtn.textContent = move ? 'Mode: Move Vertices' : 'Mode: Pan/Zoom';
      this.el.interactionModeBtn.setAttribute('aria-pressed', move ? 'false' : 'true');
    }

    onReseed() {
      if (this.interactionMode === 'pan') {
        this.animateViewportReset();
        return;
      }
      this.cancelViewportAnimation();
      this.graphDescription = null;
      this.config.seed = nextDeterministicSeed(this.config.seed || 1);
      this.config.graphCode = '';
      this.previousConfig = JSON.parse(JSON.stringify(this.config));
      this.hideComputationOutputs();
      this.resetTraceState();
      this.dirtyGraph = true;
      this.dirtyTable = true;
      this.refreshOutputsIfNeeded(true);
    }
    onEulerTraceChanged() {
      if (this.el.eulerTrace.checked) { this.el.hamiltonTrace.checked = false; this.el.planarityColor.checked = false; }
      this.resetTraceState();
      this.onAnyInputChanged();
    }
    onHamiltonTraceChanged() {
      if (this.el.hamiltonTrace.checked) { this.el.eulerTrace.checked = false; this.el.planarityColor.checked = false; }
      this.resetTraceState();
      this.onAnyInputChanged();
    }
    onPlanarityColorChanged() {
      if (this.el.planarityColor.checked) { this.el.eulerTrace.checked = false; this.el.hamiltonTrace.checked = false; }
      this.onAnyInputChanged();
    }
    hideComputationOutputs() {
      [this.el.eulerResult, this.el.hamiltonResult, this.el.planarityResult].forEach(el => { el.style.display = 'none'; el.textContent = ''; });
    }
    resetTraceState() { this.eulerTraceState = []; this.hamiltonTraceState = []; }

    refreshOutputsIfNeeded(force=false) {
      const selected = force ? 'Graph' : this.activeTab;
      const needsBundle = force || ((selected === 'Graph' || selected === 'Table') && (this.dirtyGraph || this.dirtyTable || !this.bundle));
      if (needsBundle) {
        try {
          if (ENABLE_INSTRUCTOR_TAB) this.logic.maxRetries = clipInt(this.el.instRestartAttempts.value || 100, 1, 100000);
          const oldBundle = this.bundle;
          const oldSignature = this.lastMainSignature;
          const newBundle = this.graphDescription ? this.logic.buildBundleFromDescription(this.graphDescription, this.config) : this.logic.buildGraphBundle(this.config);
          const newSignature = this.mainSignature(this.config);
          const sameGraph = oldSignature === newSignature;
          const oldViewport = this.viewport ? JSON.parse(JSON.stringify(this.viewport)) : null;
          if (sameGraph && oldBundle) {
            const oldNodes = new Set(oldBundle.graph.nodes), newNodes = new Set(newBundle.graph.nodes);
            if (oldNodes.size === newNodes.size && [...oldNodes].every(n => newNodes.has(n))) {
              Object.keys(newBundle.positions).forEach(node => newBundle.positions[node] = oldBundle.positions[node]);
            }
          }
          this.bundle = newBundle;
          if (!this.graphDescription) this.syncGraphCodeFromBundle();
          this.lastMainSignature = newSignature;
          this.viewport = (sameGraph && oldViewport) ? oldViewport : null;
          if (!sameGraph) this.initialViewport = null;
          this.sanitizeVertexDropdowns();
          this.crossingEdgeCache = this.config.planarityColor ? this.computeCrossingEdgeSet() : new Set();
          if (sameGraph) {
            const eSet = new Set(this.bundle.edgeIds.map(edgeKey));
            this.eulerTraceState = this.eulerTraceState.filter(e => eSet.has(edgeKey(e)));
            const nSet = new Set(this.bundle.graph.nodes);
            this.hamiltonTraceState = this.hamiltonTraceState.filter(n => nSet.has(n));
          } else this.resetTraceState();
        } catch (e) {
          alert('Unable to build graph:\n' + e.message);
          this.writeConfigToUI(this.previousConfig);
          this.config = JSON.parse(JSON.stringify(this.previousConfig));
          return;
        }
      }
      if (force || selected === 'Graph') {
        if (this.dirtyGraph || force) this.drawCurrentGraph();
        if (this.bundle) this.el.graphStats.textContent = `Vertices: ${this.bundle.graph.numberOfNodes()}    Edges: ${this.bundle.graph.numberOfEdges()}`;
        this.dirtyGraph = false;
      }
      if (force || selected === 'Table') {
        if (this.dirtyTable || force) this.refreshTable();
        this.dirtyTable = false;
      }
    }

    sanitizeVertexDropdowns() {
      if (!this.bundle) return;
      const labels = this.bundle.graph.nodes.slice();
      this.el.vertexList.innerHTML = labels.map(v => `<option value="${v}"></option>`).join('');
      this.config.eulerStart = this.clipVertexLabel(this.config.eulerStart, labels);
      this.config.eulerEnd = this.clipVertexLabel(this.config.eulerEnd, labels);
      this.config.hamiltonStart = this.clipVertexLabel(this.config.hamiltonStart, labels);
      this.config.hamiltonEnd = this.clipVertexLabel(this.config.hamiltonEnd, labels);
      this.el.eulerStart.value = this.config.eulerStart;
      this.el.eulerEnd.value = this.config.eulerEnd;
      this.el.hamiltonStart.value = this.config.hamiltonStart;
      this.el.hamiltonEnd.value = this.config.hamiltonEnd;
    }
    clipVertexLabel(value, labels) {
      if (!labels.length) return '';
      const s = (value || '').trim().toUpperCase();
      if (labels.includes(s)) return s;
      try {
        let n = 0;
        for (const ch of s) { if (ch < 'A' || ch > 'Z') throw new Error(); n = n*26 + (ch.charCodeAt(0)-64); }
        const idx = Math.max(0, Math.min(labels.length - 1, n - 1));
        return labels[idx];
      } catch { return labels[0]; }
    }

    onCountEuler() {
      if (this.dirtyGraph || !this.bundle) this.refreshOutputsIfNeeded(true);
      const result = this.logic.countEulerPaths(this.bundle, this.config.eulerStart, this.config.eulerEnd);
      this.el.eulerResult.textContent = `Number of Euler ${this.config.eulerStart === this.config.eulerEnd ? 'circuits' : 'paths'}: ${result}`;
      this.el.eulerResult.style.display = 'block';
    }
    onCountHamilton() {
      if (this.dirtyGraph || !this.bundle) this.refreshOutputsIfNeeded(true);
      const result = this.logic.countHamiltonPaths(this.bundle, this.config.hamiltonStart, this.config.hamiltonEnd);
      this.el.hamiltonResult.textContent = `Number of Hamilton ${this.config.hamiltonStart === this.config.hamiltonEnd ? 'circuits' : 'paths'}: ${result}`;
      this.el.hamiltonResult.style.display = 'block';
    }
    onCheckPlanarity() {
      if (this.dirtyGraph || !this.bundle) this.refreshOutputsIfNeeded(true);
      let text = `Planarity: ${this.logic.planarityText(this.bundle)}`;
      if (this.bundle.planarityMethod === 'approximate' && this.bundle.planarityNote) {
        text += ` (${this.bundle.planarityNote})`;
      }
      this.el.planarityResult.textContent = text;
      this.el.planarityResult.style.display = 'block';
    }
    onGenerateInstructor() {
      const numResults = clipInt(this.el.instNumResults.value || 1, 1, 1000);
      const restartAttempts = clipInt(this.el.instRestartAttempts.value || 100, 1, 100000);
      this.logic.maxRetries = restartAttempts;
      const baseConfig = this.readConfigFromUI();
      const found = [];
      const seen = new Set();
      const rng = new PythonRandom(baseConfig.seed >>> 0);
      const maxSeedTrials = Math.max(500, numResults * 500);
      for (let i=0;i<maxSeedTrials && found.length < numResults;i++) {
        const seed = randInt(rng, 0, 2147483647);
        if (seen.has(seed)) continue;
        seen.add(seed);
        const cfg = JSON.parse(JSON.stringify(baseConfig));
        cfg.seed = seed;
        try {
          const bundle = this.logic.buildGraphBundle(cfg);
          if (this.logic.bundleMatchesConstraints(bundle, cfg)) found.push(GraphCodeCodec.encodeDescription(this.logic.bundleToGraphDescription(bundle, cfg)));
        } catch {}
      }
      this.el.instOutput.value = found.length ? found.join('\n') : 'No matching graph codes found with the current settings.';
    }

    extractVertexName(textValue) {
      if (!textValue) return null;
      let s = String(textValue).trim();
      while (s.includes('. ')) {
        const idx = s.indexOf('. ');
        const prefix = s.slice(0, idx).trim();
        if (/^\d+$/.test(prefix)) s = s.slice(idx + 2).trim();
        else break;
      }
      if (s.includes('(')) s = s.split('(',1)[0];
      return s.trim();
    }

    refreshTable() {
      this.el.tableBody.innerHTML = '';
      if (!this.bundle) return;
      this.el.thEdge.textContent = this.config.displayEdgeLabels ? 'Edge' : '';
      if (this.config.directed) {
        this.el.thFrom.textContent = this.config.displayValence ? 'From Vertex (In-Valence, Out-Valence)' : 'From Vertex';
        this.el.thTo.textContent = this.config.displayValence ? 'To Vertex (In-Valence, Out-Valence)' : 'To Vertex';
      } else {
        this.el.thFrom.textContent = this.config.displayValence ? 'Vertex (Valence)' : 'Vertex';
        this.el.thTo.textContent = this.config.displayValence ? 'Vertex (Valence)' : 'Vertex';
      }
      const hOrder = {};
      this.hamiltonTraceState.forEach((node,i)=> hOrder[node] = i+1);
      this.bundle.tableRows.forEach((row,idx) => {
        const edge = this.bundle.edgeIds[idx];
        const tr = document.createElement('tr');
        const leftNode = this.extractVertexName(row[1]);
        const rightNode = this.extractVertexName(row[2]);
        let edgeDisplay = row[0];
        if (this.config.eulerTrace && this.eulerTraceState.findIndex(e => edgeKey(e) === edgeKey(edge)) >= 0) {
          const order = this.eulerTraceState.findIndex(e => edgeKey(e) === edgeKey(edge)) + 1;
          edgeDisplay = `${order}. ${row[0] || '[edge]'}`;
          tr.classList.add('euler-selected');
        }
        let leftDisplay = row[1], rightDisplay = row[2];
        if (this.config.hamiltonTrace) {
          if (hOrder[leftNode]) { leftDisplay = `${hOrder[leftNode]}. ${row[1]}`; tr.classList.add('hamilton-selected'); }
          if (hOrder[rightNode]) { rightDisplay = `${hOrder[rightNode]}. ${row[2]}`; tr.classList.add('hamilton-selected'); }
        }
        tr.dataset.edgeIndex = idx;
        tr.innerHTML = `<td>${edgeDisplay}</td><td data-col="2">${leftDisplay}</td><td data-col="3">${rightDisplay}</td>`;
        this.el.tableBody.appendChild(tr);
      });
    }

    onTableClick(event) {
      if (!this.bundle) return;
      const tr = event.target.closest('tr');
      if (!tr) return;
      const idx = Number(tr.dataset.edgeIndex);
      const edge = this.bundle.edgeIds[idx];
      if (this.config.eulerTrace) {
        this.handleEulerTableClick(edge);
        this.refreshTable();
        return;
      }
      if (this.config.hamiltonTrace) {
        const td = event.target.closest('td');
        if (!td || !['2','3'].includes(td.dataset.col)) return;
        const node = this.extractVertexName(td.textContent);
        if (node) {
          this.handleHamiltonTableClick(node);
          this.refreshTable();
          this.drawCurrentGraph();
        }
      }
    }

    handleEulerTableClick(edge) {
      const idx = this.eulerTraceState.findIndex(e => edgeKey(e) === edgeKey(edge));
      if (idx >= 0) { this.eulerTraceState = this.eulerTraceState.slice(0, idx); this.drawCurrentGraph(); return; }
      const directed = Object.keys(this.bundle.edgeOrientations).length > 0;
      const graph = this.bundle.graph;
      let nextVertex;
      if (directed) {
        const [frm,to] = this.bundle.edgeOrientations[edgeKey(edge)];
        if (!this.eulerTraceState.length) {
          if (frm !== this.config.eulerStart) return;
          if (graph.numberOfEdges() === 1 && to !== this.config.eulerEnd) return;
          this.eulerTraceState.push(edge); this.drawCurrentGraph(); return;
        }
        const currentVertex = this.bundle.edgeOrientations[edgeKey(this.eulerTraceState[this.eulerTraceState.length - 1])][1];
        if (frm !== currentVertex) return;
        nextVertex = to;
      } else {
        const {u,v} = edge;
        if (!this.eulerTraceState.length) {
          if (![u,v].includes(this.config.eulerStart)) return;
          if (graph.numberOfEdges() === 1 && ![u,v].includes(this.config.eulerEnd)) return;
          this.eulerTraceState.push(edge); this.drawCurrentGraph(); return;
        }
        const currentVertex = this.currentUndirectedTraceEndpoint();
        if (![u,v].includes(currentVertex)) return;
        nextVertex = (u === currentVertex) ? v : u;
      }
      const isLast = (this.eulerTraceState.length + 1 === graph.numberOfEdges());
      if (isLast && nextVertex !== this.config.eulerEnd) return;
      this.eulerTraceState.push(edge);
      this.drawCurrentGraph();
    }

    handleHamiltonTableClick(node) {
      if (!this.bundle.graph.nodes.includes(node)) return;
      const idx = this.hamiltonTraceState.indexOf(node);
      if (idx >= 0) { this.hamiltonTraceState = this.hamiltonTraceState.slice(0, idx); return; }
      if (!this.hamiltonTraceState.length) {
        if (node !== this.config.hamiltonStart) return;
        this.hamiltonTraceState.push(node); return;
      }
      const prev = this.hamiltonTraceState[this.hamiltonTraceState.length - 1];
      if (this.config.directed) {
        const allowed = Object.values(this.bundle.edgeOrientations).some(([frm,to]) => frm === prev && to === node);
        if (!allowed) return;
      } else if (!this.bundle.graph.hasEdge(prev, node)) return;
      if (this.hamiltonTraceState.length + 1 === this.bundle.graph.numberOfNodes() && node !== this.config.hamiltonEnd) return;
      this.hamiltonTraceState.push(node);
    }

    currentUndirectedTraceEndpoint() {
      let endpoint = this.config.eulerStart;
      for (const edge of this.eulerTraceState) endpoint = (endpoint === edge.u) ? edge.v : edge.u;
      return endpoint;
    }

    computeCrossingEdgeSet() {
      if (!this.bundle) return new Set();
      const crossing = new Set();
      const edges = this.bundle.edgeIds;
      for (let i=0;i<edges.length;i++) {
        const e1 = edges[i];
        if (e1.u === e1.v) continue;
        const p1 = this.bundle.positions[e1.u], p2 = this.bundle.positions[e1.v];
        for (let j=i+1;j<edges.length;j++) {
          const e2 = edges[j];
          if (e2.u === e2.v) continue;
          if (new Set([e1.u,e1.v,e2.u,e2.v]).size < 4) continue;
          const p3 = this.bundle.positions[e2.u], p4 = this.bundle.positions[e2.v];
          if (this.segmentsCross(p1,p2,p3,p4)) { crossing.add(edgeKey(e1)); crossing.add(edgeKey(e2)); }
        }
      }
      return crossing;
    }
    segmentsCross(p1,p2,p3,p4) {
      const orient = (a,b,c) => (b[0]-a[0])*(c[1]-a[1]) - (b[1]-a[1])*(c[0]-a[0]);
      const o1 = orient(p1,p2,p3), o2 = orient(p1,p2,p4), o3 = orient(p3,p4,p1), o4 = orient(p3,p4,p2);
      return (o1*o2 < 0) && (o3*o4 < 0);
    }

    cancelViewportAnimation() {
      if (this.viewportAnimationFrame !== null) {
        cancelAnimationFrame(this.viewportAnimationFrame);
        this.viewportAnimationFrame = null;
      }
    }

    cloneViewport(vp) {
      return vp ? {minX:vp.minX, maxX:vp.maxX, minY:vp.minY, maxY:vp.maxY, w:vp.w, h:vp.h, pad:vp.pad} : null;
    }

    interpolateViewport(a, b, t) {
      return {
        minX: a.minX + (b.minX - a.minX) * t,
        maxX: a.maxX + (b.maxX - a.maxX) * t,
        minY: a.minY + (b.minY - a.minY) * t,
        maxY: a.maxY + (b.maxY - a.maxY) * t,
        w: b.w,
        h: b.h,
        pad: b.pad,
      };
    }

    animateViewportReset() {
      if (!this.viewport || !this.initialViewport) return;
      this.cancelViewportAnimation();
      const start = this.cloneViewport(this.viewport);
      const target = this.cloneViewport(this.initialViewport);
      const duration = 260;
      const ease = t => 1 - Math.pow(1 - t, 3);
      const startTime = performance.now();

      const step = now => {
        const raw = Math.min(1, (now - startTime) / duration);
        const t = ease(raw);
        this.viewport = this.interpolateViewport(start, target, t);
        this.drawCurrentGraph(false);
        if (raw < 1) {
          this.viewportAnimationFrame = requestAnimationFrame(step);
        } else {
          this.viewport = this.cloneViewport(target);
          this.viewportAnimationFrame = null;
          this.drawCurrentGraph(false);
        }
      };

      this.viewportAnimationFrame = requestAnimationFrame(step);
    }

    computeViewport(force=false) {
      if (this.viewport && !force) return;
      const xs = Object.values(this.bundle.positions).map(p => p[0]);
      const ys = Object.values(this.bundle.positions).map(p => p[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const width = Math.max(1.0, maxX - minX), height = Math.max(1.0, maxY - minY);
      const padX = Math.max(1.0, 0.35 * width), padY = Math.max(1.0, 0.35 * height);
      const fullMinX = minX - padX, fullMaxX = maxX + padX, fullMinY = minY - padY, fullMaxY = maxY + padY;
      this.viewport = {minX:fullMinX,maxX:fullMaxX,minY:fullMinY,maxY:fullMaxY,w:1000,h:700,pad:55};
      this.initialViewport = this.cloneViewport(this.viewport);
      this.baseViewportSpan = {
        x: Math.max(1e-6, fullMaxX - fullMinX),
        y: Math.max(1e-6, fullMaxY - fullMinY),
      };
    }

    visualZoomScale() {
      if (!this.viewport || !this.baseViewportSpan) return 1;
      const currentX = Math.max(1e-6, this.viewport.maxX - this.viewport.minX);
      const currentY = Math.max(1e-6, this.viewport.maxY - this.viewport.minY);
      const zx = this.baseViewportSpan.x / currentX;
      const zy = this.baseViewportSpan.y / currentY;
      return Math.max(1, Math.min(10.0, Math.min(zx, zy)));
    }

    nodeVisualRadius() {
      return Math.max(24, Math.min(120, 24 * Math.pow(this.visualZoomScale(), 0.68)));
    }

    nodeLabelFontSize() {
      return Math.max(12, Math.min(80, 12 * Math.pow(this.visualZoomScale(), 0.72)));
    }

    edgeLabelFontSize() {
      return Math.max(13, Math.min(64, 13 * Math.pow(this.visualZoomScale(), 0.58)));
    }

    traceFontSize() {
      return Math.max(14, Math.min(68, 14 * Math.pow(this.visualZoomScale(), 0.60)));
    }
    panByScreenDelta(dx, dy) {
      const vp = this.viewport;
      const usableW = vp.w - 2 * vp.pad;
      const usableH = vp.h - 2 * vp.pad;
      const dataDx = -(dx / usableW) * (vp.maxX - vp.minX);
      const dataDy = (dy / usableH) * (vp.maxY - vp.minY);
      vp.minX += dataDx; vp.maxX += dataDx;
      vp.minY += dataDy; vp.maxY += dataDy;
    }
    zoomAtSvgPoint(point, factor) {
      const vp = this.viewport;
      const clamped = Math.max(0.5, Math.min(2.0, factor));
      const anchor = this.screenToData(point);
      vp.minX = anchor[0] + (vp.minX - anchor[0]) * clamped;
      vp.maxX = anchor[0] + (vp.maxX - anchor[0]) * clamped;
      vp.minY = anchor[1] + (vp.minY - anchor[1]) * clamped;
      vp.maxY = anchor[1] + (vp.maxY - anchor[1]) * clamped;
    }
    dataToScreen([x,y]) {
      const vp = this.viewport;
      const sx = vp.pad + ((x - vp.minX) / (vp.maxX - vp.minX)) * (vp.w - 2*vp.pad);
      const sy = vp.h - vp.pad - ((y - vp.minY) / (vp.maxY - vp.minY)) * (vp.h - 2*vp.pad);
      return [sx, sy];
    }
    screenToData([sx,sy]) {
      const vp = this.viewport;
      const x = vp.minX + ((sx - vp.pad) / (vp.w - 2*vp.pad)) * (vp.maxX - vp.minX);
      const y = vp.minY + ((vp.h - vp.pad - sy) / (vp.h - 2*vp.pad)) * (vp.maxY - vp.minY);
      return [x,y];
    }

    curvedMidpoint(p1,p2,rad) {
      const [x1,y1]=p1,[x2,y2]=p2;
      const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1;
      const len=Math.hypot(dx,dy); if (!len) return [mx,my];
      const nx=-dy/len, ny=dx/len, bow=rad*len*0.5;
      return [mx+nx*bow,my+ny*bow];
    }
    selfLoopGeometry(edge) {
      const rawOffset = this.bundle.pairOffsets[edgeKey(edge)] || 0;
      const [x,y] = this.bundle.positions[edge.u];
      const loopIndex = rawOffset / 0.18;

      // Anchor loop endpoints at the vertex center so the node itself hides
      // the attachment points. This prevents the loop from appearing to float
      // away from the vertex during zooming or at different stroke widths.
      const angle = -Math.PI / 2 + loopIndex * 0.52;
      const baseRadius = 0.68 + 0.16 * Math.abs(loopIndex);
      const lobeOffset = 0.34;
      const tangentialPush = 0.14 * loopIndex;

      const start = [x, y];
      const end = [x, y];
      const c1 = [
        x + baseRadius * Math.cos(angle - lobeOffset) - tangentialPush * Math.sin(angle),
        y + baseRadius * Math.sin(angle - lobeOffset) + tangentialPush * Math.cos(angle)
      ];
      const c2 = [
        x + baseRadius * Math.cos(angle + lobeOffset) + tangentialPush * Math.sin(angle),
        y + baseRadius * Math.sin(angle + lobeOffset) - tangentialPush * Math.cos(angle)
      ];
      const mid = [x + (baseRadius + 0.08) * Math.cos(angle), y + (baseRadius + 0.08) * Math.sin(angle)];
      return {start, end, c1, c2, mid, angle, radius: baseRadius};
    }

    edgeDrawGeometry(edge) {
      const rawOffset = this.bundle.pairOffsets[edgeKey(edge)] || 0;
      if (edge.u === edge.v) {
        const loop = this.selfLoopGeometry(edge);
        return {...loop, rad:0.0, displayStartNode: edge.u, displayEndNode: edge.v};
      }
      // Match the Python tool's display model: the rendered curve should use a
      // stable endpoint order for an unordered pair, while direction is handled
      // separately by edgeOrientations. Without this, opposite-order parallel
      // edges can mirror onto each other and visually overlap.
      const [du, dv] = canonicalDisplayEndpoints(edge.u, edge.v);
      const p1 = this.bundle.positions[du], p2 = this.bundle.positions[dv];
      return {start:p1, end:p2, rad:rawOffset, mid:this.curvedMidpoint(p1,p2,rawOffset), displayStartNode: du, displayEndNode: dv};
    }
    quadraticControlPoint(edge) {
      // Keep repeated-edge separation in screen space, matching the rendered
      // geometry more closely to the Python version. If the control point is
      // computed only in data coordinates, non-uniform x/y scaling can cause
      // distinct curved edges to collapse visually into one another.
      const geom = this.edgeDrawGeometry(edge);
      const start = this.dataToScreen(geom.start);
      const end = this.dataToScreen(geom.end);
      const rad = geom.rad;
      const mx = (start[0] + end[0]) / 2;
      const my = (start[1] + end[1]) / 2;
      const dx = end[0] - start[0];
      const dy = end[1] - start[1];
      const len = Math.hypot(dx, dy);
      if (!len) return [mx, my];
      const nx = -dy / len;
      const ny = dx / len;
      const bow = rad * len * 0.5;
      return [mx + 2 * nx * bow, my + 2 * ny * bow];
    }

    edgePathD(edge) {
      const geom = this.edgeDrawGeometry(edge);
      const [sx,sy] = this.dataToScreen(geom.start);
      const [ex,ey] = this.dataToScreen(geom.end);
      if (edge.u === edge.v) {
        const [c1x,c1y] = this.dataToScreen(geom.c1);
        const [c2x,c2y] = this.dataToScreen(geom.c2);
        return `M ${sx} ${sy} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${ex} ${ey}`;
      }
      const [cx,cy] = this.quadraticControlPoint(edge);
      return `M ${sx} ${sy} Q ${cx} ${cy} ${ex} ${ey}`;
    }

    edgeLabelPosition(edge) {
      if (edge.u === edge.v) {
        const geom = this.edgeDrawGeometry(edge);
        return this.dataToScreen(geom.mid);
      }
      const start = this.dataToScreen(this.bundle.positions[edge.u]);
      const end = this.dataToScreen(this.bundle.positions[edge.v]);
      const c = this.quadraticControlPoint(edge);
      const t = 0.5;
      const x = (1-t)*(1-t)*start[0] + 2*(1-t)*t*c[0] + t*t*end[0];
      const y = (1-t)*(1-t)*start[1] + 2*(1-t)*t*c[1] + t*t*end[1];
      return [x, y];
    }

    directionMarker(edge) {
      const geom = this.edgeDrawGeometry(edge);
      let t = 0.62;
      if (edge.u === edge.v) t = 0.50;
      let point, tangent;
      if (edge.u === edge.v) {
        const s = this.dataToScreen(geom.start);
        const e = this.dataToScreen(geom.end);
        const c1 = this.dataToScreen(geom.c1);
        const c2 = this.dataToScreen(geom.c2);
        const omt = 1 - t;
        const x = omt*omt*omt*s[0] + 3*omt*omt*t*c1[0] + 3*omt*t*t*c2[0] + t*t*t*e[0];
        const y = omt*omt*omt*s[1] + 3*omt*omt*t*c1[1] + 3*omt*t*t*c2[1] + t*t*t*e[1];
        point = [x, y];
        const dx = 3*omt*omt*(c1[0]-s[0]) + 6*omt*t*(c2[0]-c1[0]) + 3*t*t*(e[0]-c2[0]);
        const dy = 3*omt*omt*(c1[1]-s[1]) + 6*omt*t*(c2[1]-c1[1]) + 3*t*t*(e[1]-c2[1]);
        tangent = [dx,dy];
      } else {
        const s = this.dataToScreen(geom.start);
        const e = this.dataToScreen(geom.end);
        // quadraticControlPoint(edge) already returns screen coordinates.
        // Do not transform it again here, or direction markers can be pushed
        // far off the visible edge after zoom/pan.
        const c = this.quadraticControlPoint(edge);
        const x = (1-t)*(1-t)*s[0] + 2*(1-t)*t*c[0] + t*t*e[0];
        const y = (1-t)*(1-t)*s[1] + 2*(1-t)*t*c[1] + t*t*e[1];
        point = [x, y];
        const dx = 2*(1-t)*(c[0]-s[0]) + 2*t*(e[0]-c[0]);
        const dy = 2*(1-t)*(c[1]-s[1]) + 2*t*(e[1]-c[1]);
        tangent = [dx,dy];
      }
      if (this.config.directed) {
        const [frm,to] = this.bundle.edgeOrientations[edgeKey(edge)] || [edge.u, edge.v];
        if (frm === edge.v && to === edge.u) tangent = [-tangent[0], -tangent[1]];
      }
      const ang = Math.atan2(tangent[1], tangent[0]);
      return {point, angle: ang};
    }

    drawCurrentGraph(resetViewport=false) {
      if (!this.bundle) return;
      this.computeViewport(resetViewport);
      const svg = this.el.graphSvg;
      while (svg.lastChild && svg.lastChild.tagName !== 'defs') svg.removeChild(svg.lastChild);
      const layerEdges = svgEl('g');
      const layerLabels = svgEl('g');
      const layerNodes = svgEl('g');
      svg.appendChild(layerEdges); svg.appendChild(layerLabels); svg.appendChild(layerNodes);

      this.bundle.edgeIds.forEach(edge => {
        const isEuler = this.eulerTraceState.some(e => edgeKey(e) === edgeKey(edge));
        const color = isEuler ? TRACE_EDGE_COLOR : (this.crossingEdgeCache.has(edgeKey(edge)) ? CROSSING_EDGE_COLOR : EDGE_COLOR);
        const path = svgEl('path', {
          d: this.edgePathD(edge),
          fill: 'none',
          stroke: color,
          'stroke-width': edge.u === edge.v ? (isEuler ? 4 : 3) : (isEuler ? 3.5 : 2.5),
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round',
        });
        layerEdges.appendChild(path);

        if (this.config.directed && edge.u !== edge.v) {
          const {point, angle} = this.directionMarker(edge);
          const size = (this.config.displayEdgeLabels ? 16 : 11) * Math.max(1, Math.min(3.2, Math.pow(this.visualZoomScale(), 0.50)));
          const [px,py] = point;
          const tri = svgEl('path', {
            d: `M ${px + Math.cos(angle)*size} ${py + Math.sin(angle)*size} L ${px + Math.cos(angle + 2.4)*size*0.75} ${py + Math.sin(angle + 2.4)*size*0.75} L ${px + Math.cos(angle - 2.4)*size*0.75} ${py + Math.sin(angle - 2.4)*size*0.75} Z`,
            fill: GW_BLUE,
            stroke: GW_BLUE,
            'stroke-width': 1,
          });
          layerLabels.appendChild(tri);
        }

        if (this.config.displayEdgeLabels) {
          const [lx,ly] = this.edgeLabelPosition(edge);
          const label = this.bundle.edgeLabels[edgeKey(edge)] || '';
          const g = svgEl('g');
          const edgeLabelFont = this.edgeLabelFontSize();
          const rectW = Math.max(24, edgeLabelFont * 1.85);
          const rectH = Math.max(22, edgeLabelFont * 1.55);
          const rect = svgEl('rect', {x: lx-rectW/2, y: ly-rectH/2, width: rectW, height: rectH, rx: Math.max(8, rectH * 0.36), fill: 'white', opacity: 0.92});
          const text = svgEl('text', {x: lx, y: ly + edgeLabelFont*0.31, 'font-size': edgeLabelFont, 'text-anchor': 'middle', fill: GW_BLUE, 'font-weight': '700'});
          text.textContent = label;
          g.appendChild(rect); g.appendChild(text);
          layerLabels.appendChild(g);
        }
      });

      const nodeRadius = this.nodeVisualRadius();
      const nodeFont = this.nodeLabelFontSize();
      this.bundle.graph.nodes.forEach(node => {
        const [x,y] = this.dataToScreen(this.bundle.positions[node]);
        const fill = this.hamiltonTraceState.includes(node) ? TRACE_NODE_COLOR : NODE_FILL;
        const g = svgEl('g', {'data-node': node});
        const circle = svgEl('circle', {cx:x, cy:y, r:nodeRadius, fill, stroke:GW_BLUE, 'stroke-width': Math.max(2.2, nodeRadius * 0.09)});
        const txt = svgEl('text', {x, y: y + nodeFont*0.32, 'font-size': nodeFont, 'text-anchor':'middle', fill:'white', 'font-weight':'700', 'pointer-events':'none'});
        txt.textContent = this.labelTextFor(node);
        g.appendChild(circle);
        g.appendChild(txt);
        layerNodes.appendChild(g);
      });

      if (this.config.eulerTrace) {
        this.eulerTraceState.forEach((edge,i) => {
          const [x,y] = this.edgeLabelPosition(edge);
          const t = svgEl('text', {x, y: y - 14, 'font-size': this.traceFontSize(), 'text-anchor':'middle', fill:TRACE_EDGE_COLOR, 'font-weight':'800'});
          t.textContent = String(i+1); layerLabels.appendChild(t);
        });
      }
      if (this.config.hamiltonTrace) {
        this.hamiltonTraceState.forEach((node,i) => {
          const [x,y] = this.dataToScreen(this.bundle.positions[node]);
          const t = svgEl('text', {x: x+18, y: y-14, 'font-size': this.traceFontSize(), 'text-anchor':'middle', fill:TRACE_EDGE_COLOR, 'font-weight':'800'});
          t.textContent = String(i+1); layerLabels.appendChild(t);
        });
      }
      this.refreshTable();
      this.el.graphStats.textContent = `Vertices: ${this.bundle.graph.numberOfNodes()}    Edges: ${this.bundle.graph.numberOfEdges()}`;
    }

    labelTextFor(node) {
      if (!this.config.displayValence) return node;
      if (this.config.directed) {
        const [indeg,outdeg] = this.bundle.valences[node];
        return `${node} (${indeg},${outdeg})`;
      }
      return `${node} (${this.bundle.valences[node]})`;
    }

    pickNode(sx,sy,pointerType='mouse') {
      if (!this.bundle) return null;
      const isTouchLike = pointerType === 'touch' || pointerType === 'pen';
      const nodeRadiusPx = this.nodeVisualRadius();
      const hitRadius = Math.max(nodeRadiusPx + (isTouchLike ? 18 : 12), isTouchLike ? 64 : 44);
      const ambiguityGap = isTouchLike ? 5 : 4;
      let best = null, bestD = Infinity, secondD = Infinity;
      for (const node of this.bundle.graph.nodes) {
        const [nx,ny] = this.dataToScreen(this.bundle.positions[node]);
        const d = Math.hypot(sx-nx, sy-ny);
        if (d < bestD) {
          secondD = bestD;
          bestD = d;
          best = node;
        } else if (d < secondD) {
          secondD = d;
        }
      }
      if (bestD > hitRadius) return null;
      if (secondD - bestD < ambiguityGap && bestD > nodeRadiusPx * 0.9) return null;
      return best;
    }
  }

  new App();
})();
</script>
</body>
</html>
