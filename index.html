<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Graph Maker</title>
<style>
  :root {
    --gw-blue: #033C5A;
    --gw-buff: #D6BF91;
    --node-fill: #AA9868;
    --edge: #033C5A;
    --cross: #B22222;
    --trace-edge: #D97706;
    --trace-node: #E8C76A;
    --bg: #F7F5F0;
    --panel: #FFFFFF;
    --text: #1F2937;
    --muted: #6B7280;
    --line: #D7DDE4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .app {
    max-width: 1600px;
    margin: 0 auto;
    padding: 12px;
  }
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tab-btn {
    border: 0;
    padding: 10px 14px;
    border-radius: 12px;
    background: var(--panel);
    color: var(--gw-blue);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .tab-btn.active { background: var(--gw-buff); }
  .tab-panel {
    display: none;
    background: var(--panel);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,.08);
  }
  .tab-panel.active { display: block; }
  .form-grid {
    display: grid;
    grid-template-columns: minmax(180px, 260px) minmax(140px, 280px);
    gap: 10px 14px;
    align-items: center;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label { font-weight: 600; color: var(--gw-blue); }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font: inherit;
    background: white;
    color: var(--text);
  }
  textarea { min-height: 170px; resize: vertical; }
  .radio-box, .check-stack, .group-box {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
    background: #fff;
  }
  .group-box > .title { font-weight: 700; color: var(--gw-blue); margin-bottom: 6px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    border: 0;
    background: var(--gw-blue);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:disabled { opacity: .55; cursor: default; }
  .btn[aria-pressed="true"] { background: #05507A; box-shadow: inset 0 0 0 2px rgba(255,255,255,.35); }

  .mode-switch {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    user-select: none;
  }
  .mode-switch input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .mode-slider {
    position: relative;
    width: 54px;
    height: 30px;
    border-radius: 999px;
    background: var(--gw-blue);
    flex: 0 0 auto;
    cursor: pointer;
    transition: background 0.18s ease;
  }
  .mode-slider::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
    transition: transform 0.18s ease;
  }
  .mode-switch input:checked + .mode-slider::after {
    transform: translateX(24px);
  }
  .mode-label {
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    font-size: 0.95rem;
    transition: color 0.18s ease, font-weight 0.18s ease;
  }
  .mode-label.active {
    color: var(--gw-blue);
    font-weight: 800;
  }
  .result-box {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid rgba(0,0,0,.12);
    border-radius: 12px;
    background: var(--gw-buff);
    font-weight: 600;
  }
  .graph-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .graph-stats {
    color: var(--gw-blue);
    font-weight: 800;
  }
  .graph-wrap {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: white;
    overflow: hidden;
  }
  svg {
    display: block;
    width: 100%;
    height: min(76vh, 780px);
    touch-action: none;
    background: white;
  }
  .table-wrap {
    overflow-x: hidden;
    overflow-y: auto;
    max-height: min(72vh, 760px);
    border: 1px solid var(--line);
    border-radius: 14px;
    background: white;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 0;
    font-size: 0.95rem;
  }
  thead th {
    position: sticky;
    top: 0;
    background: white;
    color: var(--gw-blue);
    z-index: 1;
  }
  th, td {
    border-bottom: 1px solid var(--line);
    padding: 8px 8px;
    text-align: center;
    overflow-wrap: anywhere;
  }
  tbody tr.euler-selected { background: var(--gw-buff); }
  tbody tr.hamilton-selected { background: #F3E7C5; }
  .muted { color: var(--muted); font-size: .94rem; }
  .hidden { display: none !important; }

  .noscript-note {
    max-width: 1600px;
    margin: 12px auto 0;
    padding: 12px 14px;
    border-radius: 14px;
    background: #FFF4D6;
    color: #5B3A00;
    border: 1px solid #E6C97A;
    font-weight: 600;
  }
  @media (max-width: 840px) {
    .form-grid { grid-template-columns: 1fr; }
    svg { height: 62vh; }
    table { font-size: 0.85rem; }
    th, td { padding: 7px 6px; }
  }
</style>
</head>
<body>
<noscript>
  <div class="noscript-note">This graph tool requires JavaScript to generate graphs, load graph codes, check planarity, and count Euler or Hamilton paths. Please enable JavaScript in your browser and reload the page.</div>
</noscript>
<div class="app">
  <div class="tabs" id="tabs"></div>

  <section class="tab-panel" data-tab="Main">
    <div class="form-grid">
      <label for="graphCode">Graph Code</label>
      <input id="graphCode" type="text" spellcheck="false" autocapitalize="off" autocomplete="off" />

      <div class="full group-box">
        <div class="title">Graph Type</div>
        <div class="stack" id="graphTypeBox">
          <label><input type="radio" name="graphType" value="0"> Regular</label>
          <label><input type="radio" name="graphType" value="1"> Bipartite</label>
          <label><input type="radio" name="graphType" value="2"> Rectangular Grid</label>
          <label><input type="radio" name="graphType" value="3"> Cylindrical Grid</label>
        </div>
      </div>

      <label id="basicNLabel" for="basicN">Number of Vertices</label>
      <input id="basicN" type="number" min="1" max="99" step="1" />

      <label id="specialMLabel" for="specialM">Special Graph M</label>
      <input id="specialM" type="number" min="1" max="99" step="1" />

      <label id="specialPLabel" for="specialP">Special Graph P</label>
      <input id="specialP" type="number" min="1" max="99" step="1" />

      <label id="valenceMeanLabel" for="valenceMean">Valence Mean</label>
      <input id="valenceMean" type="number" min="1" max="99" step="0.1" />

      <label id="valenceStdLabel" for="valenceStd">Valence Standard Deviation</label>
      <input id="valenceStd" type="number" min="0" max="25" step="0.1" />

      <div class="full check-stack stack">
        <label><input id="selfLoops" type="checkbox"> Allow Self-Loops</label>
        <label><input id="allowRepeatedEdges" type="checkbox"> Allow Repeated Edges</label>
        <label><input id="directed" type="checkbox"> Directed Graph</label>
        <label><input id="complete" type="checkbox"> Complete Graph</label>
        <label><input id="displayValence" type="checkbox"> Display Valence</label>
        <label><input id="displayEdgeLabels" type="checkbox"> Display Edge Labels</label>
      </div>
    </div>
  </section>

  <section class="tab-panel" data-tab="Euler">
    <div class="form-grid">
      <label for="eulerStart">Euler Path Start</label>
      <input id="eulerStart" list="vertexList" type="text" />
      <label for="eulerEnd">Euler Path End</label>
      <input id="eulerEnd" list="vertexList" type="text" />
      <div class="full"><label><input id="eulerTrace" type="checkbox"> Euler Trace Mode</label></div>
      <div class="full"><button class="btn" id="countEulerBtn">Count Euler Paths</button></div>
      <div class="full result-box" id="eulerResult"></div>
    </div>
  </section>

  <section class="tab-panel" data-tab="Hamilton">
    <div class="form-grid">
      <label for="hamiltonStart">Hamilton Path Start</label>
      <input id="hamiltonStart" list="vertexList" type="text" />
      <label for="hamiltonEnd">Hamilton Path End</label>
      <input id="hamiltonEnd" list="vertexList" type="text" />
      <div class="full"><label><input id="hamiltonTrace" type="checkbox"> Hamilton Trace Mode</label></div>
      <div class="full"><button class="btn" id="countHamiltonBtn">Count Hamilton Paths</button></div>
      <div class="full result-box" id="hamiltonResult"></div>
    </div>
  </section>

  <section class="tab-panel" data-tab="Planarity">
    <div class="form-grid">
      <div class="full"><label><input id="planarityColor" type="checkbox"> Color Crossing Edges</label></div>
      <div class="full"><button class="btn" id="checkPlanarityBtn">Check Planarity</button></div>
      <div class="full result-box" id="planarityResult"></div>
    </div>
  </section>

  <section class="tab-panel" data-tab="Instructor">
    <div class="form-grid">
      <div class="group-box">
        <div class="title">Euler Path</div>
        <div class="stack">
          <label><input type="radio" name="instEuler" value="2"> Exists</label>
          <label><input type="radio" name="instEuler" value="0"> Does Not Exist</label>
          <label><input type="radio" name="instEuler" value="1"> Either</label>
        </div>
      </div>
      <div class="group-box">
        <div class="title">Hamilton Path</div>
        <div class="stack">
          <label><input type="radio" name="instHamilton" value="2"> Exists</label>
          <label><input type="radio" name="instHamilton" value="0"> Does Not Exist</label>
          <label><input type="radio" name="instHamilton" value="1"> Either</label>
        </div>
      </div>
      <div class="group-box full">
        <div class="title">Planarity</div>
        <div class="stack">
          <label><input type="radio" name="instPlanarity" value="2"> Planar</label>
          <label><input type="radio" name="instPlanarity" value="0"> Not Planar</label>
          <label><input type="radio" name="instPlanarity" value="1"> Either</label>
        </div>
      </div>
      <label for="instNumResults">Number of Results</label>
      <input id="instNumResults" type="number" min="1" max="1000" step="1" />
      <label for="instRestartAttempts">Number of Restart Attempts</label>
      <input id="instRestartAttempts" type="number" min="1" max="100000" step="1" />
      <div class="full"><button class="btn" id="instGenerateBtn">Generate</button></div>
      <div class="full">
        <label for="instOutput">Matching Graph Codes</label>
        <textarea id="instOutput"></textarea>
      </div>
    </div>
  </section>

  <section class="tab-panel" data-tab="Graph">
    <div class="graph-top">
      <div class="graph-stats" id="graphStats"></div>
      <div class="row">
        <label class="mode-switch" for="interactionModeToggle" aria-label="Interaction mode toggle">
          <span class="mode-label move active" id="moveModeLabel">Move Vertices</span>
          <input id="interactionModeToggle" type="checkbox" role="switch" aria-label="Toggle between Move Vertices and Pan/Zoom" />
          <span class="mode-slider" aria-hidden="true"></span>
          <span class="mode-label pan" id="panModeLabel">Pan/Zoom</span>
        </label>
        <button class="btn" id="reseedBtn">Reseed</button>
      </div>
    </div>
    <div class="graph-wrap">
      <svg id="graphSvg" viewBox="0 0 1000 700" aria-label="Graph drawing">
        <defs>
          <marker id="arrowMarker" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L8,3 z" fill="#033C5A"></path>
          </marker>
        </defs>
      </svg>
    </div>
  </section>

  <section class="tab-panel" data-tab="Table">
    <div class="table-wrap">
      <table id="edgeTable">
        <thead>
          <tr><th id="thEdge">Edge</th><th id="thFrom">From Vertex</th><th id="thTo">To Vertex</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <datalist id="vertexList"></datalist>
</div>
<script>
(() => {
  const GW_BLUE = '#033C5A';
  const GW_BUFF = '#D6BF91';
  const NODE_FILL = '#AA9868';
  const EDGE_COLOR = GW_BLUE;
  const CROSSING_EDGE_COLOR = '#B22222';
  const TRACE_EDGE_COLOR = '#D97706';
  const TRACE_NODE_COLOR = '#E8C76A';
  // Set to true to re-enable the Instructor tab without removing any of its code.
  const ENABLE_INSTRUCTOR_TAB = false;

  const TAB_NAMES = ENABLE_INSTRUCTOR_TAB
    ? ['Main','Euler','Hamilton','Planarity','Instructor','Graph','Table']
    : ['Main','Euler','Hamilton','Planarity','Graph','Table'];

  function clipInt(value, low, high) {
    let n = Number(value);
    if (!Number.isFinite(n)) n = low;
    n = Math.ceil(n);
    return Math.max(low, Math.min(high, n));
  }
  function clipFloat(value, low, high) {
    let n = Number(value);
    if (!Number.isFinite(n)) n = low;
    return Math.max(low, Math.min(high, n));
  }
  function indexToExcelLabel(index) {
    let label = '';
    let n = index + 1;
    while (n > 0) {
      const rem = (n - 1) % 26;
      label = String.fromCharCode(65 + rem) + label;
      n = Math.floor((n - 1) / 26);
    }
    return label;
  }
  function excelLabelToIndex(label) {
    if (typeof label !== 'string') return null;
    const s = label.trim().toUpperCase();
    if (!s || !/^[A-Z]+$/.test(s)) return null;
    let v = 0;
    for (const ch of s) v = v * 26 + (ch.charCodeAt(0) - 64);
    return v - 1;
  }
  function generateVertexLabels(n) { return Array.from({length:n}, (_,i)=>indexToExcelLabel(i)); }
  function generateEdgeLabels(n) { return Array.from({length:n}, (_,i)=>indexToExcelLabel(i).toLowerCase()); }

  class PythonRandom {
    constructor(seed=0) {
      this.N = 624;
      this.M = 397;
      this.MATRIX_A = 0x9908b0df;
      this.UPPER_MASK = 0x80000000;
      this.LOWER_MASK = 0x7fffffff;
      this.mt = new Array(this.N).fill(0);
      this.mti = this.N + 1;
      this.gaussNext = null;
      this.seed(seed);
    }
    seed(seedValue=0) {
      let n = Number(seedValue);
      if (!Number.isFinite(n)) n = 0;
      n = Math.floor(Math.abs(n));
      const key = [n >>> 0];
      this.initByArray(key);
      this.gaussNext = null;
    }
    initGenRand(s) {
      this.mt[0] = s >>> 0;
      for (this.mti = 1; this.mti < this.N; this.mti++) {
        const prev = this.mt[this.mti - 1] >>> 0;
        this.mt[this.mti] = (Math.imul(1812433253, (prev ^ (prev >>> 30))) + this.mti) >>> 0;
      }
    }
    initByArray(key) {
      this.initGenRand(19650218);
      let i = 1;
      let j = 0;
      let k = Math.max(this.N, key.length);
      for (; k > 0; k--) {
        const prev = this.mt[i - 1] >>> 0;
        this.mt[i] = ((this.mt[i] ^ Math.imul((prev ^ (prev >>> 30)), 1664525)) + (key[j] >>> 0) + j) >>> 0;
        i++;
        j++;
        if (i >= this.N) {
          this.mt[0] = this.mt[this.N - 1];
          i = 1;
        }
        if (j >= key.length) j = 0;
      }
      for (k = this.N - 1; k > 0; k--) {
        const prev = this.mt[i - 1] >>> 0;
        this.mt[i] = ((this.mt[i] ^ Math.imul((prev ^ (prev >>> 30)), 1566083941)) - i) >>> 0;
        i++;
        if (i >= this.N) {
          this.mt[0] = this.mt[this.N - 1];
          i = 1;
        }
      }
      this.mt[0] = 0x80000000;
    }
    genrandInt32() {
      let y;
      const mag01 = [0x0, this.MATRIX_A];
      if (this.mti >= this.N) {
        let kk;
        for (kk = 0; kk < this.N - this.M; kk++) {
          y = (this.mt[kk] & this.UPPER_MASK) | (this.mt[kk + 1] & this.LOWER_MASK);
          this.mt[kk] = this.mt[kk + this.M] ^ (y >>> 1) ^ mag01[y & 0x1];
        }
        for (; kk < this.N - 1; kk++) {
          y = (this.mt[kk] & this.UPPER_MASK) | (this.mt[kk + 1] & this.LOWER_MASK);
          this.mt[kk] = this.mt[kk + (this.M - this.N)] ^ (y >>> 1) ^ mag01[y & 0x1];
        }
        y = (this.mt[this.N - 1] & this.UPPER_MASK) | (this.mt[0] & this.LOWER_MASK);
        this.mt[this.N - 1] = this.mt[this.M - 1] ^ (y >>> 1) ^ mag01[y & 0x1];
        this.mti = 0;
      }
      y = this.mt[this.mti++];
      y ^= (y >>> 11);
      y ^= (y << 7) & 0x9d2c5680;
      y ^= (y << 15) & 0xefc60000;
      y ^= (y >>> 18);
      return y >>> 0;
    }
    random() {
      const a = this.genrandInt32() >>> 5;
      const b = this.genrandInt32() >>> 6;
      return (a * 67108864 + b) / 9007199254740992;
    }
    getrandbits(k) {
      if (k <= 0) return 0;
      let bits = 0n;
      let shift = 0n;
      let remaining = k;
      while (remaining > 0) {
        const word = BigInt(this.genrandInt32());
        const take = Math.min(32, remaining);
        const mask = (1n << BigInt(take)) - 1n;
        bits |= (word & mask) << shift;
        shift += BigInt(take);
        remaining -= take;
      }
      return bits;
    }
    randbelow(n) {
      if (!(n > 0)) throw new Error('randbelow requires n > 0');
      const bigN = BigInt(n);
      const k = Math.ceil(Math.log2(n));
      while (true) {
        const r = this.getrandbits(k);
        if (r < bigN) return Number(r);
      }
    }
    randint(low, high) {
      return low + this.randbelow(high - low + 1);
    }
    choice(arr) {
      return arr[this.randbelow(arr.length)];
    }
    shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = this.randbelow(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    gauss(mean=0, std=1) {
      let z = this.gaussNext;
      this.gaussNext = null;
      if (z === null) {
        const x2pi = this.random() * (2.0 * Math.PI);
        const g2rad = Math.sqrt(-2.0 * Math.log(1.0 - this.random()));
        z = Math.cos(x2pi) * g2rad;
        this.gaussNext = Math.sin(x2pi) * g2rad;
      }
      return mean + z * std;
    }
  }

  function rand01(rng) { return (typeof rng === 'function') ? rng() : rng.random(); }
  function randInt(rng, low, high) { return (typeof rng === 'function') ? (low + Math.floor(rng() * (high - low + 1))) : rng.randint(low, high); }
  function randomChoice(rng, arr) { return (typeof rng === 'function') ? arr[Math.floor(rng() * arr.length)] : rng.choice(arr); }
  function shuffle(rng, arr) {
    if (typeof rng !== 'function') return rng.shuffle(arr);
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function randomGaussian(rng, mean=0, std=1) {
    if (typeof rng !== 'function') return rng.gauss(mean, std);
    let u = 0, v = 0;
    while (u === 0) u = rand01(rng);
    while (v === 0) v = rand01(rng);
    const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    return mean + std * z;
  }

  function randomSeed32() {
    try {
      const arr = new Uint32Array(1);
      if (globalThis.crypto && typeof globalThis.crypto.getRandomValues === 'function') {
        globalThis.crypto.getRandomValues(arr);
        return arr[0] & 0x7fffffff;
      }
    } catch (e) {}
    return (Date.now() ^ 0x6D2B79F5) & 0x7fffffff;
  }

  function nextDeterministicSeed(seed) {
    const rng = new PythonRandom((seed >>> 0) || 1);
    return randInt(rng, 0, 2147483647);
  }
  function svgEl(name, attrs={}) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', name);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }
  function edgeKey(edge) { return `${edge.u}|${edge.v}|${edge.k}`; }
  function unorderedPairKey(u,v) { return u === v ? `${u}|${u}` : [u,v].sort().join('|'); }
  function canonicalDisplayEndpoints(u, v) {
    if (u === v) return [u, v];
    return String(u) <= String(v) ? [u, v] : [v, u];
  }



  class GraphCodeCodec {
    static flagsString(desc) {
      const gt = desc.graphType | 0;
      if (![0, 1, 2, 3].includes(gt)) throw new Error('Invalid graphType.');
      return `${gt}${desc.selfLoops ? '1' : '0'}${desc.allowRepeatedEdges ? '1' : '0'}${desc.directed ? '1' : '0'}${desc.complete ? '1' : '0'}`;
    }
    static parseFlags(s) {
      const trimmed = String(s || '').trim();
      if (!/^[0-3][01][01][01][01]$/.test(trimmed)) throw new Error('Invalid flags field.');
      return {
        graphType: parseInt(trimmed[0], 10),
        selfLoops: trimmed[1] === '1',
        allowRepeatedEdges: trimmed[2] === '1',

      if (c.graphType === 1) {

        if (Math.abs(m-p) > 1 && c.hamiltonPathFlag === 2) c.hamiltonPathFlag = 0;
        if ((m === 1 && p > 2) || (p === 1 && m > 2)) if (c.hamiltonPathFlag === 2) c.hamiltonPathFlag = 0;
      }
      return c;
    }

    buildRegularGraph(config, rng) {
      const usePairwiseMultiedges = (config.complete && config.directed);
      const graph = this.makeGraph(config.allowRepeatedEdges || usePairwiseMultiedges);
      const labels = generateVertexLabels(config.basicN);
      graph.addNodesFrom(labels);
      const positions = this.circleLayout(labels);
      if (config.complete) {
        labels.forEach((u,i) => {
          if (config.selfLoops && this.canAddEdge(graph,u,u,config.allowRepeatedEdges || usePairwiseMultiedges)) graph.addEdge(u,u);
          labels.slice(i+1).forEach(v => {
            if (usePairwiseMultiedges) {
              graph.addEdge(u,v,{orientationHint:[u,v]});
              graph.addEdge(u,v,{orientationHint:[v,u]});
            } else if (this.canAddEdge(graph,u,v,config.allowRepeatedEdges)) graph.addEdge(u,v);
          });
        });
        return [graph, labels, positions];
      }
      const targets = {};
      labels.forEach(label => {
        const raw = Math.round(randomGaussian(rng, config.valenceMean, config.valenceStd));
        targets[label] = Math.max(0, raw);
      });
      let attempts = 0;
      while (attempts < 2000) {
        attempts += 1;
        const deficits = [];
        labels.forEach(node => {
          const deficit = targets[node] - graph.degree(node);
          if (deficit > 0) for (let i=0;i<Math.min(deficit,3);i++) deficits.push(node);
        });
        if (deficits.length < 2 && !(config.selfLoops && deficits.length === 1)) break;
        const u = randomChoice(rng, deficits);
        const v = randomChoice(rng, labels);
        if (!config.selfLoops && u === v) continue;
        if (!this.canAddEdge(graph,u,v,config.allowRepeatedEdges)) continue;
        graph.addEdge(u,v);
      }
      this.ensureConnected(graph, labels, config.allowRepeatedEdges, rng);
      if (config.eulerPathFlag === 2 && !this.hasEulerianPath(graph)) this.forceEulerPath(graph, config.allowRepeatedEdges);
      if (config.hamiltonPathFlag === 2) this.forceHamiltonPath(graph, config.allowRepeatedEdges);
      return [graph, labels, positions];
    }

    ensureConnected(graph, labels, allowRepeatedEdges, rng) {
      if (labels.length <= 1) return;
      const comps = graph.connectedComponents();
      for (let i=0;i<comps.length-1;i++) {
        const u = randomChoice(rng, comps[i]);
        const v = randomChoice(rng, comps[i+1]);
        if (this.canAddEdge(graph,u,v,allowRepeatedEdges)) graph.addEdge(u,v);
      }
    }

    buildBipartiteGraph(config, rng) {
      const usePairwiseMultiedges = (config.complete && config.directed);
      const graph = this.makeGraph(config.allowRepeatedEdges || usePairwiseMultiedges);
      const allLabels = generateVertexLabels(config.specialM + config.specialP);
      const left = allLabels.slice(0, config.specialM);
      const rightInternal = allLabels.slice(config.specialM).map(x => `R_${x}`);
      graph.addNodesFrom(left.concat(rightInternal));
      const positions = {};
      const topCols = Math.max(1, left.length);
      const bottomCols = Math.max(1, rightInternal.length);
      const topSpacing = 1.6, bottomSpacing = 1.6;
      const topStart = -0.5 * topSpacing * (topCols - 1);
      const bottomStart = -0.5 * bottomSpacing * (bottomCols - 1);
      left.forEach((label,i)=> positions[label] = [topStart + i*topSpacing, 1.25]);
      rightInternal.forEach((label,i)=> positions[label] = [bottomStart + i*bottomSpacing, -1.25]);
      if (config.complete) {
        left.forEach(u => rightInternal.forEach(v => {
          if (usePairwiseMultiedges) {
            graph.addEdge(u,v,{orientationHint:[u,v]});
            graph.addEdge(u,v,{orientationHint:[v,u]});
          } else if (this.canAddEdge(graph,u,v,config.allowRepeatedEdges)) graph.addEdge(u,v);
        }));
      } else {
        left.forEach(u => {
          const shuffled = shuffle(rng, rightInternal);
          const edgeCount = Math.max(1, Math.min(rightInternal.length, Math.round(randomGaussian(rng, config.valenceMean, config.valenceStd))));
          shuffled.slice(0, edgeCount).forEach(v => {
            if (this.canAddEdge(graph,u,v,config.allowRepeatedEdges)) graph.addEdge(u,v);
          });
        });
        this.ensureConnectedBipartite(graph, left, rightInternal, config.allowRepeatedEdges, rng);
      }
      const visibleRight = rightInternal.map(x => x.replace('R_', ''));
      const relabel = {};
      left.concat(rightInternal).forEach((old,idx) => relabel[old] = left.concat(visibleRight)[idx]);
      const relabeled = graph.relabel(relabel);
      const newPos = {};
      Object.entries(positions).forEach(([node,xy]) => newPos[relabel[node]] = xy);
      return [relabeled, left.concat(visibleRight), newPos];
    }

    ensureConnectedBipartite(graph, left, right, allowRepeatedEdges, rng) {
      left.forEach(u => {
        if (graph.degree(u) === 0) {
          const v = randomChoice(rng, right);
          if (this.canAddEdge(graph,u,v,allowRepeatedEdges)) graph.addEdge(u,v);
        }
      });
      right.forEach(v => {
        if (graph.degree(v) === 0) {
          const u = randomChoice(rng, left);
          if (this.canAddEdge(graph,u,v,allowRepeatedEdges)) graph.addEdge(u,v);
        }
      });
      const comps = graph.connectedComponents();
      for (let i=0;i<comps.length-1;i++) {
        const c1 = comps[i], c2 = comps[i+1];
        const left1 = c1.filter(x => left.includes(x));
        const right2 = c2.filter(x => right.includes(x));
        let u,v;
        if (left1.length && right2.length) {
          u = randomChoice(rng, left1); v = randomChoice(rng, right2);
        } else {
          u = randomChoice(rng, left); v = randomChoice(rng, right);
        }
        if (this.canAddEdge(graph,u,v,allowRepeatedEdges)) graph.addEdge(u,v);
      }
    }

    buildRectangularGridGraph(config) {
      const graph = this.makeGraph(false);
      const m = config.specialM, p = config.specialP;
      const labels = generateVertexLabels(m*p);
      const nodeMap = {};
      const positions = {};
      let idx = 0;
      for (let y=0;y<p;y++) {
        for (let x=0;x<m;x++) {
          const label = labels[idx++];
          nodeMap[`${x},${y}`] = label;
          graph.addNode(label);
          positions[label] = [x * 1.5, -y * 1.5];
        }
      }
      for (let y=0;y<p;y++) {
        for (let x=0;x<m;x++) {
          const u = nodeMap[`${x},${y}`];
          if (x+1 < m) graph.addEdge(u, nodeMap[`${x+1},${y}`]);
          if (y+1 < p) graph.addEdge(u, nodeMap[`${x},${y+1}`]);
        }
      }
      return [graph, labels, positions];
    }

    buildCylindricalGridGraph(config) {
      const graph = this.makeGraph(false);
      const m = config.specialM, p = config.specialP;
      const labels = generateVertexLabels(m*p);
      const nodeMap = {};
      const positions = {};
      let idx = 0;
      const radii = Array.from({length: Math.max(1,m)}, (_,i) => 1.6 + 1.35*i);
      for (let r=0;r<m;r++) {
        for (let a=0;a<p;a++) {
          const label = labels[idx++];
          const angle = 2 * Math.PI * a / p;
          nodeMap[`${r},${a}`] = label;
          graph.addNode(label);
          positions[label] = [radii[r] * Math.cos(angle), radii[r] * Math.sin(angle)];
        }
      }
      for (let r=0;r<m;r++) {
        for (let a=0;a<p;a++) {
          const u = nodeMap[`${r},${a}`];
          graph.addEdge(u, nodeMap[`${r},${(a+1)%p}`]);
          if (r+1 < m) graph.addEdge(u, nodeMap[`${r+1},${a}`]);
        }
      }
      return [graph, labels, positions];
    }

    circleLayout(labels) {
      const n = labels.length;
      if (n === 1) return {[labels[0]]:[0,0]};
      const out = {};
      labels.forEach((label,i)=> out[label] = [Math.cos(2*Math.PI*i/n), Math.sin(2*Math.PI*i/n)]);
      return out;
    }

    forceEulerPath(graph, allowRepeatedEdges) {
      let odd = graph.nodes.filter(node => graph.degree(node) % 2 === 1);
      while (odd.length > 2) {
        const u = odd.pop();
        const v = odd.pop();
        if (allowRepeatedEdges || !graph.hasEdge(u,v)) graph.addEdge(u,v);
      }
    }

    forceHamiltonPath(graph, allowRepeatedEdges) {
      const nodes = graph.nodes.slice();
      for (let i=0;i<nodes.length-1;i++) if (allowRepeatedEdges || !graph.hasEdge(nodes[i], nodes[i+1])) graph.addEdge(nodes[i], nodes[i+1]);
    }

    extractEdgeMetadata(graph, config, rng) {
      const edgeIds = graph.edges.map(e => ({u:e.u, v:e.v, k:e.k}));
      const edgeSlotMap = {};
      edgeIds.forEach(edge => {
        const full = graph.edges.find(e => e.u===edge.u && e.v===edge.v && e.k===edge.k);
        edgeSlotMap[edgeKey(edge)] = full?.displaySlot || 0;
      });
      const incidentEdges = {};
      graph.nodes.forEach(n => incidentEdges[n] = []);
      const edgeOrientations = {};
      edgeIds.forEach(edge => {
        incidentEdges[edge.u].push(edge);
        if (edge.u !== edge.v) incidentEdges[edge.v].push(edge);
        if (config.directed) {
          const full = graph.edges.find(e => e.u===edge.u && e.v===edge.v && e.k===edge.k) || {};
          if (edge.u === edge.v) edgeOrientations[edgeKey(edge)] = [edge.u, edge.v];
          else if (full.orientationHint) edgeOrientations[edgeKey(edge)] = full.orientationHint.slice();
          else edgeOrientations[edgeKey(edge)] = rand01(rng) < 0.5 ? [edge.u, edge.v] : [edge.v, edge.u];
        }
      });
      return {edgeIds, edgeSlotMap, incidentEdges, edgeOrientations};
    }

    computePairOffsets(edgeIds, edgeSlotMap={}) {
      const groups = {};
      edgeIds.forEach(edge => {
        const key = unorderedPairKey(edge.u, edge.v);
        (groups[key] ||= []).push(edge);
      });
      const offsets = {};
      Object.values(groups).forEach(edges => {
        if (edges.length === 1) offsets[edgeKey(edges[0])] = 0.0;
        else {
          const center = (edges.length - 1) / 2;
          const ordered = edges.slice().sort((a,b)=>(edgeSlotMap[edgeKey(a)]||0) - (edgeSlotMap[edgeKey(b)]||0));
          ordered.forEach((edge,i)=> offsets[edgeKey(edge)] = (i-center)*0.18);
        }
      });
      return offsets;
    }

    computeValences(graph, edgeIds, edgeOrientations, directed=false) {
      if (!directed) {
        const out = {};
        graph.nodes.forEach(n => out[n] = graph.degree(n));
        return out;
      }
      const counts = {};
      graph.nodes.forEach(n => counts[n] = [0,0]);
      edgeIds.forEach(edge => {
        const [frm,to] = edgeOrientations[edgeKey(edge)];
        counts[frm][1] += 1;
        counts[to][0] += 1;
      });
      return counts;
    }

    formatVertexWithValence(node, valences, directed, displayValence) {
      if (!displayValence) return node;
      if (directed) {
        const [i,o] = valences[node];
        return `${node}(${i},${o})`;
      }
      return `${node}(${valences[node]})`;
    }

    planarityText(bundle) { return bundle.isPlanar ? 'Planar' : 'Not planar'; }

    hasEulerianPath(graph) {
      if (!graph.isConnectedIgnoringIsolated()) return false;
      const odd = graph.nodes.filter(n => graph.degree(n) % 2 === 1).length;
      return odd === 0 || odd === 2;
    }

    bundleMatchesConstraints(bundle, config) {
      const eulerExists = this.countEulerPaths(bundle, null, null, 1) !== 0;
      const hamiltonExists = this.countHamiltonPaths(bundle, null, null, 1) !== 0;
      const planar = !!bundle.isPlanar;
      if (config.eulerPathFlag === 2 && !eulerExists) return false;
      if (config.eulerPathFlag === 0 && eulerExists) return false;
      if (config.hamiltonPathFlag === 2 && !hamiltonExists) return false;
      if (config.hamiltonPathFlag === 0 && hamiltonExists) return false;
      if (config.planarityFlag === 2 && !planar) return false;
      if (config.planarityFlag === 0 && planar) return false;
      return true;
    }

    countEulerPaths(bundle, start, end, limit=1000) {
      const graph = bundle.graph;
      const edgeIds = bundle.edgeIds;
      const directed = Object.keys(bundle.edgeOrientations).length > 0;
      if (edgeIds.length === 0) return (start == null || end == null || start === end) ? 1 : 0;
      if (start != null && !graph.hasNode(start)) return 0;
      if (end != null && !graph.hasNode(end)) return 0;
      if (directed) {
        const indeg = {}, outdeg = {};
        graph.nodes.forEach(n => { indeg[n] = 0; outdeg[n] = 0; });
        edgeIds.forEach(edge => {
          const [frm,to] = bundle.edgeOrientations[edgeKey(edge)];
          outdeg[frm] += 1; indeg[to] += 1;
        });
        const plusOne = graph.nodes.filter(n => outdeg[n] - indeg[n] === 1);
        const minusOne = graph.nodes.filter(n => indeg[n] - outdeg[n] === 1);
        const bad = graph.nodes.filter(n => Math.abs(outdeg[n] - indeg[n]) > 1);
        if (bad.length) return 0;
        if (!plusOne.length && !minusOne.length) {
          const valid = graph.nodes.filter(n => indeg[n] + outdeg[n] > 0);
          if (start != null && end != null && start !== end) return 0;
          if (start != null && !valid.includes(start)) return 0;
          if (end != null && !valid.includes(end)) return 0;
        } else if (plusOne.length === 1 && minusOne.length === 1) {
          if (start != null && start !== plusOne[0]) return 0;
          if (end != null && end !== minusOne[0]) return 0;
        } else return 0;

        const adjacency = {};
        graph.nodes.forEach(n => adjacency[n] = []);
        edgeIds.forEach(edge => {
          const [frm] = bundle.edgeOrientations[edgeKey(edge)];
          adjacency[frm].push(edge);
        });
        const starts = start != null ? [start] : (plusOne.length ? plusOne : graph.nodes.filter(n => adjacency[n].length));
        const used = new Set();
        let count = 0;
        const dfs = (current, usedCount) => {
          if (count > limit) return;
          if (usedCount === edgeIds.length) {
            if (end == null || current === end) count += 1;
            return;
          }
          for (const edge of adjacency[current]) {
            const ek = edgeKey(edge);
            if (used.has(ek)) continue;
            const [,nxt] = bundle.edgeOrientations[ek];
            used.add(ek);
            dfs(nxt, usedCount + 1);
            used.delete(ek);
          }
        };
        for (const s of starts) { dfs(s,0); if (count > limit) break; }
        return count > limit ? '> 1000' : count;
      }

      if (!this.hasEulerianPath(graph)) return 0;
      const odd = graph.nodes.filter(n => graph.degree(n) % 2 === 1);
      if (odd.length === 0) {
        const valid = graph.nodes.filter(n => graph.degree(n) > 0);
        if (start != null && end != null && start !== end) return 0;
        if (start != null && !valid.includes(start)) return 0;
        if (end != null && !valid.includes(end)) return 0;
      } else if (odd.length === 2) {
        const validSet = new Set(odd);
        if (start != null && !validSet.has(start)) return 0;
        if (end != null && !validSet.has(end)) return 0;
        if (start != null && end != null && start === end) return 0;
      } else return 0;

      const adjacency = {};
      graph.nodes.forEach(n => adjacency[n] = []);
      edgeIds.forEach(edge => { adjacency[edge.u].push(edge); adjacency[edge.v].push(edge); });
      const used = new Set(); let count = 0;
      const starts = start != null ? [start] : (odd.length === 2 ? odd : graph.nodes.filter(n => adjacency[n].length));
      const otherEnd = (edge,current) => edge.u === current ? edge.v : edge.u;
      const dfs = (current, usedCount) => {
        if (count > limit) return;
        if (usedCount === edgeIds.length) { if (end == null || current === end) count += 1; return; }
        for (const edge of adjacency[current]) {
          const ek = edgeKey(edge);
          if (used.has(ek)) continue;
          used.add(ek);
          dfs(otherEnd(edge,current), usedCount+1);
          used.delete(ek);
        }
      };
      for (const s of starts) { dfs(s,0); if (count > limit) break; }
      return count > limit ? '> 1000' : count;
    }

    countHamiltonPaths(bundle, start, end, limit=1000) {
      const graph = bundle.graph;
      const nodes = graph.nodes.slice();
      if (!nodes.length) return 0;
      if (start != null && !graph.hasNode(start)) return 0;
      if (end != null && !graph.hasNode(end)) return 0;
      const directed = Object.keys(bundle.edgeOrientations).length > 0;
      const countCircuits = (start != null && end != null && start === end);
      const nodeToBit = {};
      nodes.forEach((n,i)=> nodeToBit[n] = i);
      const allMask = (1 << nodes.length) - 1;
      const adjacency = {};
      nodes.forEach(n => adjacency[n] = {});
      if (directed) {
        bundle.edgeIds.forEach(edge => {
          const [frm,to] = bundle.edgeOrientations[edgeKey(edge)];
          if (frm === to) return;
          adjacency[frm][to] = (adjacency[frm][to] || 0) + 1;
        });
      } else {
        bundle.edgeIds.forEach(edge => {
          if (edge.u === edge.v) return;
          adjacency[edge.u][edge.v] = (adjacency[edge.u][edge.v] || 0) + 1;
          adjacency[edge.v][edge.u] = (adjacency[edge.v][edge.u] || 0) + 1;
        });
      }
      const memo = new Map();
      const dfs = (current, mask, startNode) => {
        const key = `${current}|${mask}|${startNode}`;
        if (memo.has(key)) return memo.get(key);
        if (mask === allMask) {
          const ans = countCircuits ? (adjacency[current][startNode] || 0) : ((end == null || current === end) ? 1 : 0);
          memo.set(key, ans);
          return ans;
        }
        let totalCount = 0;
        for (const [nxt, mult] of Object.entries(adjacency[current])) {
          const bit = 1 << nodeToBit[nxt];
          if (mask & bit) continue;
          const subtotal = dfs(nxt, mask | bit, startNode);
          if (subtotal) {
            totalCount += mult * subtotal;
            if (totalCount > limit) { memo.set(key, limit + 1); return limit + 1; }
          }
        }
        memo.set(key, totalCount);
        return totalCount;
      };
      const starts = start != null ? [start] : nodes;
      let total = 0;
      for (const s of starts) {
        total += dfs(s, 1 << nodeToBit[s], s);
        if (total > limit) return '> 1000';
      }
      return total;
    }

    checkPlanarity(graph, config) {
      const g = graph.simpleUnderlying();
      try {
        const exact = this.exactPlanarityCheck(g, config);
        if (exact != null) {
          return {isPlanar: exact, method: 'exact', note: ''};
        }
      } catch (err) {
        const fallback = this.approximatePlanarityCheck(g, config);
        return {isPlanar: fallback, method: 'approximate', note: 'Exact planarity check failed on this device/browser; using approximate check.'};
      }
      const fallback = this.approximatePlanarityCheck(g, config);
      return {isPlanar: fallback, method: 'approximate', note: 'Exact planarity check unavailable for this graph size; using approximate check.'};
    }

    exactPlanarityCheck(graph, config) {
      const g = graph.simpleUnderlying();
      const n = g.numberOfNodes();
      const m = g.numberOfEdges();
      if (n <= 4) return true;
      if (config.graphType === 2 || config.graphType === 3) return true;
      if (!g.isConnectedIgnoringIsolated()) {
        for (const comp of g.connectedComponents()) {
          const sub = new SimpleGraph(false);
          sub.addNodesFrom(comp);
          g.edges.forEach(e => { if (comp.includes(e.u) && comp.includes(e.v)) sub.addEdge(e.u,e.v); });
          const subAns = this.exactPlanarityCheck(sub, config);
          if (subAns == null) return null;
          if (!subAns) return false;
        }
        return true;
      }
      if (m > 3*n - 6) return false;
      if (this.isBipartite(g) && m > 2*n - 4) return false;
      if (config.complete) {
        if (config.graphType === 0) return config.basicN <= 4;
        if (config.graphType === 1) return Math.min(config.specialM, config.specialP) <= 2;
      }
      if (n > 11) return null;
      const timedOut = () => (Date.now() - startTime) > timeBudgetMs;
      const startTime = Date.now();
      const timeBudgetMs = 120;
      if (this.hasK5MinorExact(g, timedOut)) return false;
      if (this.hasK33MinorExact(g, timedOut)) return false;
      return true;
    }

    approximatePlanarityCheck(g, config) {
      const n = g.numberOfNodes();
      const m = g.numberOfEdges();
      if (n <= 4) return true;
      if (!g.isConnectedIgnoringIsolated()) {
        return g.connectedComponents().every(comp => {
          const sub = new SimpleGraph(false);
          sub.addNodesFrom(comp);
          g.edges.forEach(e => { if (comp.includes(e.u) && comp.includes(e.v)) sub.addEdge(e.u,e.v); });
          return this.approximatePlanarityCheck(sub, config);
        });
      }
      if (m > 3*n - 6) return false;
      if (this.isBipartite(g) && m > 2*n - 4) return false;
      if (config.graphType === 2 || config.graphType === 3) return true;
      if (config.complete) {
        if (config.graphType === 0) return config.basicN <= 4;
        if (config.graphType === 1) return Math.min(config.specialM, config.specialP) <= 2;
      }
      if (this.containsK5(g)) return false;
      if (this.containsK33(g)) return false;
      return true;
    }

    hasK5MinorExact(graph, timedOut) {
      return this.hasTargetMinorByPartitions(graph, 5, [[0,1],[0,2],[0,3],[0,4],[1,2],[1,3],[1,4],[2,3],[2,4],[3,4]], timedOut);
    }

    hasK33MinorExact(graph, timedOut) {
      return this.hasTargetMinorByPartitions(graph, 6, [[0,3],[0,4],[0,5],[1,3],[1,4],[1,5],[2,3],[2,4],[2,5]], timedOut);
    }

    hasTargetMinorByPartitions(graph, targetBins, requiredPairs, timedOut) {
      const nodes = [...graph.nodes];
      if (nodes.length < targetBins) return false;
      const adj = {};
      for (const node of nodes) adj[node] = new Set(graph.neighbors(node));
      const bins = Array.from({length: targetBins}, () => []);
      const assignment = new Map();
      const order = [...nodes].sort((a,b) => graph.degree(b) - graph.degree(a));
      const requiredByBin = Array.from({length: targetBins}, () => new Set());
      for (const [a,b] of requiredPairs) { requiredByBin[a].add(b); requiredByBin[b].add(a); }

      const binConnected = (binIndex) => {
        const bin = bins[binIndex];
        if (bin.length <= 1) return true;
        const allowed = new Set(bin);
        const stack = [bin[0]];
        const seen = new Set([bin[0]]);
        while (stack.length) {
          const cur = stack.pop();
          for (const nxt of adj[cur]) {
            if (allowed.has(nxt) && !seen.has(nxt)) { seen.add(nxt); stack.push(nxt); }
          }
        }
        return seen.size === bin.length;
      };

      const binsAdjacent = (i, j) => {
        for (const u of bins[i]) for (const v of adj[u]) if (assignment.get(v) === j) return true;
        return false;
      };

      const partialFeasible = () => {
        const remaining = order.filter(n => !assignment.has(n)).length;
        const emptyBins = bins.filter(b => b.length === 0).length;
        if (remaining < emptyBins) return false;
        for (let i = 0; i < targetBins; i++) {
          if (bins[i].length > 0 && !binConnected(i)) return false;
        }
        for (const [a,b] of requiredPairs) {
          if (bins[a].length > 0 && bins[b].length > 0) {
            if (binsAdjacent(a,b)) continue;
            let possible = false;
            for (const u of bins[a]) {
              for (const v of adj[u]) {
                const bv = assignment.get(v);
                if (bv == null || bv === b) { possible = true; break; }
              }
              if (possible) break;
            }
            if (!possible) {
              for (const u of bins[b]) {
                for (const v of adj[u]) {
                  const bv = assignment.get(v);
                  if (bv == null || bv === a) { possible = true; break; }
                }
                if (possible) break;
              }
            }
            if (!possible) return false;
          }
        }
        return true;
      };

      const finalValid = () => {
        if (bins.some(b => b.length === 0)) return false;
        for (let i = 0; i < targetBins; i++) if (!binConnected(i)) return false;
        for (const [a,b] of requiredPairs) if (!binsAdjacent(a,b)) return false;
        return true;
      };

      const dfs = (idx, usedBins) => {
        if (timedOut()) throw new Error('planarity_exact_timeout');
        if (idx === order.length) return finalValid();
        const node = order[idx];
        const maxBin = Math.min(targetBins - 1, usedBins);
        for (let b = 0; b <= maxBin; b++) {
          const wasEmpty = bins[b].length === 0;
          if (wasEmpty && b !== usedBins) continue;
          bins[b].push(node);
          assignment.set(node, b);
          if (partialFeasible()) {
            const nextUsed = usedBins + (wasEmpty ? 1 : 0);
            if (dfs(idx + 1, nextUsed)) return true;
          }
          assignment.delete(node);
          bins[b].pop();
        }
        return false;
      };

      try {
        return dfs(0, 0);
      } catch (err) {
        if (String(err && err.message) === 'planarity_exact_timeout') throw err;
        throw err;
      }
    }

    isBipartite(graph) {
      const color = {};
      for (const start of graph.nodes) {
        if (color[start] != null) continue;
        color[start] = 0;
        const q = [start];
        while (q.length) {
          const cur = q.shift();
          for (const nxt of graph.neighbors(cur)) {
            if (color[nxt] == null) { color[nxt] = 1 - color[cur]; q.push(nxt); }
            else if (color[nxt] === color[cur]) return false;
          }
        }
      }
      return true;
    }

    containsK5(graph) {
      if (graph.numberOfNodes() < 5) return false;
      const nodes = graph.nodes;
      const comb = (arr, k, start=0, prefix=[], out=[]) => {
        if (prefix.length === k) { out.push(prefix.slice()); return out; }
        for (let i=start;i<=arr.length-(k-prefix.length);i++) { prefix.push(arr[i]); comb(arr,k,i+1,prefix,out); prefix.pop(); }
        return out;
      };
      for (const subset of comb(nodes,5)) {
        let ok = true;
        for (let i=0;i<subset.length;i++) for (let j=i+1;j<subset.length;j++) if (!graph.hasEdge(subset[i], subset[j])) ok = false;
        if (ok) return true;
      }
      return false;
    }

    containsK33(graph) {
      if (graph.numberOfNodes() < 6) return false;
      const nodes = graph.nodes;
      const comb = (arr, k, start=0, prefix=[], out=[]) => {
        if (prefix.length === k) { out.push(prefix.slice()); return out; }
        for (let i=start;i<=arr.length-(k-prefix.length);i++) { prefix.push(arr[i]); comb(arr,k,i+1,prefix,out); prefix.pop(); }
        return out;
      };
      for (const subset of comb(nodes,6)) {
        const sub = new SimpleGraph(false); sub.addNodesFrom(subset);
        graph.edges.forEach(e => { if (subset.includes(e.u) && subset.includes(e.v)) sub.addEdge(e.u,e.v); });
        if (!this.isBipartite(sub)) continue;
        const part = {}; const q = [subset[0]]; part[subset[0]] = 0;
        while (q.length) {
          const cur = q.shift();
          for (const nxt of sub.neighbors(cur)) if (part[nxt] == null) { part[nxt] = 1 - part[cur]; q.push(nxt); }
        }
        const left = subset.filter(n => part[n] === 0);
        const right = subset.filter(n => part[n] === 1);
        if (left.length !== 3 || right.length !== 3) continue;
        let ok = true;
        for (const u of left) for (const v of right) if (!sub.hasEdge(u,v)) ok = false;
        if (ok) return true;
      }
      return false;
    }
  }

        return [x,y];
      };

      const distance = (a, b) => Math.hypot(a[0] - b[0], a[1] - b[1]);

            evt.preventDefault();
            return;
          }
          const pts = [...this.activePointers.values()];
          const dist = distance(pts[0], pts[1]);
          const center = midpoint(pts[0], pts[1]);

          const dy = point[1] - this.panLastSvgPoint[1];

        if (this.activePointers.size === 0) {

    applyGraphTypeRules(newConfig) {
      const completeTurnedOn = newConfig.complete && !this.config.complete;
      const selfLoopsTurnedOn = newConfig.selfLoops && !this.config.selfLoops;
      const repeatedTurnedOn = newConfig.allowRepeatedEdges && !this.config.allowRepeatedEdges;
      const isGrid = newConfig.graphType === 2 || newConfig.graphType === 3;
      const isBipartite = newConfig.graphType === 1;

      if (isGrid) {
        newConfig.complete = false;

      if (completeTurnedOn || newConfig.complete) {

      if (selfLoopsTurnedOn || repeatedTurnedOn) {
